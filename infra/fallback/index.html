<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Marcador de identidade desta página: o poll() o usa para saber quando a
       resposta deixou de ser a página de fallback e passou a ser o app real (#40). -->
  <meta name="olivia-fallback-page" content="starting">
  <title>Olivia — Iniciando</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #555; }
    button {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 0.85rem; min-height: 20px; }
    .msg.error { color: #c0392b; }
    .msg.info { color: #555; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Olivia está parada</h1>
    <p>Insira o token para iniciar o servidor.</p>
    <input type="password" id="token" placeholder="Token" autocomplete="off">
    <button id="btn" onclick="iniciar()">Iniciar</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const LAMBDA_URL = 'https://kebjn6uy6l.execute-api.us-east-1.amazonaws.com/';
    // Marca presente no <meta> desta página (e ausente no app real). O poll()
    // redireciona quando a resposta NÃO contém mais esta marca. Ver #40.
    const FALLBACK_MARKER = 'olivia-fallback-page';

    async function iniciar() {
      const token = document.getElementById('token').value.trim();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');

      if (!token) { setMsg('Insira o token.', 'error'); return; }

      btn.disabled = true;
      setMsg('Enviando...', 'info');

      try {
        const res = await fetch(LAMBDA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'start', token })
        });

        if (res.status === 401) {
          setMsg('Token inválido.', 'error');
          btn.disabled = false;
          return;
        }

        if (!res.ok) {
          setMsg('Erro ao iniciar. Tente novamente.', 'error');
          btn.disabled = false;
          return;
        }

        setMsg('<span class="spinner"></span>Iniciando… aguarde.', 'info');
        poll();
      } catch (e) {
        setMsg('Erro de conexão.', 'error');
        btn.disabled = false;
      }
    }

    async function poll() {
      const base = `https://${window.location.hostname}`;
      while (true) {
        await sleep(5000);
        try {
          // Enquanto a EC2 sobe, o CloudFront devolve ESTA página de fallback
          // (custom error 502/504). Detectamos "app pronto" pela AUSÊNCIA do
          // marcador no corpo — não pelo status code: o CloudFront rotula a
          // página de fallback como 200 (ou 503, após #40), então o status
          // sozinho não distingue "subindo" de "pronto". Ver #40 e ADR-0002.
          const r = await fetch(base, { method: 'GET', cache: 'no-cache' });
          const html = await r.text();
          if (!html.includes(FALLBACK_MARKER)) {
            window.location.href = base;
            return;
          }
        } catch (_) {}
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function setMsg(html, cls) {
      const el = document.getElementById('msg');
      el.innerHTML = html;
      el.className = `msg ${cls}`;
    }

    document.getElementById('token').addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciar();
    });
  </script>
</body>
</html>
